<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Green rounded background -->
  <rect width="32" height="32" rx="7" fill="#4a9460"/>

  <!-- White calendar body -->
  <rect x="4" y="9" width="24" height="19" rx="3" fill="white"/>

  <!-- Dark header — same rx so top corners match the body -->
  <rect x="4" y="9" width="24" height="8" rx="3" fill="#2d6640"/>
  <!-- Fill in the header's bottom rounded edge so it ends straight -->
  <rect x="4" y="14" width="24" height="3" fill="#2d6640"/>

  <!-- Binding pegs -->
  <rect x="10"   y="5.5" width="2.5" height="7" rx="1.25" fill="white"/>
  <rect x="19.5" y="5.5" width="2.5" height="7" rx="1.25" fill="white"/>

  <!-- Day dots — mix of available (green) and busy (red/coral) -->
  <circle cx="10" cy="21"   r="2.2" fill="#81c784"/>
  <circle cx="16" cy="21"   r="2.2" fill="#e57373"/>
  <circle cx="22" cy="21"   r="2.2" fill="#81c784"/>
  <circle cx="10" cy="25.5" r="2.2" fill="#e57373"/>
  <circle cx="16" cy="25.5" r="2.2" fill="#81c784"/>
  <circle cx="22" cy="25.5" r="2.2" fill="#81c784"/>
</svg>
